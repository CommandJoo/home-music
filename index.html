<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link href="/logo.svg" rel="icon" type="image/svg+xml"/>
    <link as="style" href="/src/App.css" rel="preload"/>
    <link href="/src/App.css" rel="stylesheet"/>

    <link as="script" href="/src/main.tsx" rel="preload"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
    <title>Music</title>
</head>
<body>
<div id="root">
    <div id="left">
        <div id="sidebar"
             style="height: 100%; width: 100%; border-radius: 8px; background: var(--bg)"></div>
    </div>
    <div id="right">
        <div id="page-top">
            <div class="page" style="display: flex; flex-direction: column; gap: 1dvh">
                <input id="search"
                       placeholder="Search..."
                       style="outline: none;border: none;background: var(--bg-light);font-size: 1.6rem; padding: 1dvh 2dvh; font-weight: 270; width: 100%; height: 6dvh; box-sizing: border-box; border-radius: 2.5dvh"
                       type="text">
                <div id="page"
                     style="width: 100%; height: 82dvh; border-radius: 8px; background: radial-gradient(var(--bg-light), var(--bg))">

                </div>
            </div>
        </div>
        <div id="page-bottom">
            <div id="audio-controller"
                 style="height: 100%; width: 100%; border-radius: 8px; background: linear-gradient(to right, var(--bg-light), var(--bg),var(--bg-light))">
            </div>
        </div>
    </div>
</div>
<script src="/src/main.tsx" type="module"></script>
</body>
</html>
